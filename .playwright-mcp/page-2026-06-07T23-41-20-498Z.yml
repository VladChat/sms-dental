                          - generic [ref=e390]: Description
                          - paragraph [ref=e391]: Fairstone Dental Smile sends a single appointment follow-up text message to a patient who called the clinic and did not reach the office. The message helps the patient request an appointment or a callback. Messages are sent through the Missed Calls Dental software platform, but the communication is from Fairstone Dental Smile. Volume is low and strictly tied to the patient's own inbound phone call.
                        - generic [ref=e392]:
                          - generic [ref=e393]: Opt-in / message flow
                          - paragraph [ref=e394]: Consumers provide consent by placing a phone call to the dental clinic's own published business phone number and not reaching staff. The clinic's public Privacy Policy and SMS Terms pages disclose that a one-time missed-call follow-up text may be sent to the number that called. No marketing list and no third-party data is used. Consumers can reply STOP at any time to opt out, and HELP for assistance. Messaging is one-to-one and triggered only by the consumer's own inbound call to the business.
                      - generic [ref=e395]:
                        - generic [ref=e396]:
                          - generic [ref=e397]: Sample message 1
                          - generic [ref=e398]: Hi, this is Fairstone Dental Smile. We missed your call. Would you like us to help schedule an appointment? Reply STOP to opt out.
                        - generic [ref=e399]:
                          - generic [ref=e400]: Sample message 2
                          - generic [ref=e401]: Hi, this is Fairstone Dental Smile. Sorry we missed you — reply here to request an appointment or a callback. Reply HELP for help, STOP to opt out.
