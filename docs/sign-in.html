<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in &mdash; Missed Calls Dental</title>
  <meta name="description" content="Sign in to your Missed Calls Dental account.">
  <link rel="canonical" href="https://missedcallsdental.com/sign-in.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sign in &mdash; Missed Calls Dental">
  <meta property="og:description" content="Sign in to your Missed Calls Dental account.">
  <meta property="og:image" content="https://missedcallsdental.com/images/marketing/og-image.png">
  <meta property="og:url" content="https://missedcallsdental.com/sign-in.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sign in &mdash; Missed Calls Dental">
  <meta name="twitter:description" content="Sign in to your Missed Calls Dental account.">
  <meta name="twitter:image" content="https://missedcallsdental.com/images/marketing/og-image.png">
  <meta name="theme-color" content="#071527">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="Missed Calls Dental home">
        <img src="brand/logo-mark.webp" alt="">
        <span class="brand-text">
          <span class="brand-name">Missed Calls Dental</span>
          <span class="brand-tag">SMS recovery for missed patient calls</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html#how-it-works">How it works</a>
        <a href="index.html#start-trial">Pricing</a>
        <a href="index.html#start-trial" class="nav-cta">Start trial</a>
        <a href="sign-in.html" aria-current="page">Sign in</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section" aria-labelledby="signin-h1">
      <div class="container">
        <div class="section-head">
          <h1 id="signin-h1">Sign in</h1>
          <p>Welcome back. Sign in to your office account.</p>
        </div>

        <div class="form-shell">
          <form class="form" method="post" action="" aria-label="Sign in">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" placeholder="you@youroffice.com" required>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign in</button>
          </form>
          <p class="form-foot">Need an account? <a href="index.html#start-trial">Start trial</a></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>&copy; 2026 AllyExporter LLC</span>
      <nav aria-label="Footer navigation">
        <a href="index.html#how-it-works">How it works</a>

        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="sms-consent.html">SMS Consent</a>
      </nav>
    </div>
  </footer>
</body>
</html>
