<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Missed Calls Dental — Setup app UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin:0; background:#f6f8fa; color:#111827; font-family:var(--font-sans); }
  :root { --font: var(--font-sans); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [step, setStep] = useState(1);
  const [clinic, setClinic] = useState(null);
  const [number, setNumber] = useState(null);

  function reset(){ setStep(1); setClinic(null); setNumber(null); window.scrollTo({top:0}); }

  return (
    <PageShell step={step}>
      {step === 1 && <ClinicForm onDone={(c)=>{ setClinic(c); setStep(2); window.scrollTo({top:0}); }} />}
      {step === 2 && <NumberSearch clinic={clinic} onDone={(n)=>{ setNumber(n); setStep(3); window.scrollTo({top:0}); }} />}
      {step === 3 && <React.Fragment>
        <SetupStatusReady clinic={clinic} number={number} />
        <div style={{ marginTop:18, textAlign:"center" }}>
          <button onClick={reset} style={{ background:"none", border:"none", color:"#0d9488", fontWeight:600, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>↺ Restart demo</button>
        </div>
      </React.Fragment>}
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
